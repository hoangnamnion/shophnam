<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Check & Kick Gold Locket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .form-input {
            background: rgba(241, 245, 249, 0.8);
            border: 1px solid rgba(226, 232, 240, 1);
            color: #0f172a;
            transition: all 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.35s ease both; }

        /* Shimmer loading */
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position:  200% 0; }
        }
        .shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 12px;
        }

        /* Gold ring pulse */
        @keyframes goldPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(251,191,36,0.5); }
            50%       { box-shadow: 0 0 0 8px rgba(251,191,36,0); }
        }
        .gold-pulse { animation: goldPulse 2s infinite; }

        /* Kick button loading spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; display: inline-block; }

        /* Device pending pulse */
        @keyframes pendingPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.6; transform: scale(0.96); }
        }
        .pending-pulse { animation: pendingPulse 2s ease-in-out infinite; }

        /* Dot loading */
        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%            { transform: translateY(-6px); }
        }
        .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; margin: 0 2px; }
        .dot:nth-child(1) { animation: dotBounce 1.2s ease-in-out 0s infinite; }
        .dot:nth-child(2) { animation: dotBounce 1.2s ease-in-out 0.2s infinite; }
        .dot:nth-child(3) { animation: dotBounce 1.2s ease-in-out 0.4s infinite; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-blue-50 min-h-screen flex items-center justify-center p-4">

    <!-- ── MÀN HÌNH CHỜ DUYỆT THIẾT BỊ ── -->
    <div id="device_pending" class="hidden fixed inset-0 bg-gradient-to-br from-slate-900 to-slate-800 z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm text-center">
            <!-- Icon -->
            <div class="w-20 h-20 rounded-3xl bg-amber-100 flex items-center justify-center mx-auto mb-5 pending-pulse">
                <i class="fa-solid fa-shield-halved text-amber-500 text-3xl"></i>
            </div>
            <h2 class="font-black text-slate-800 text-xl mb-2">Chờ Cấp Quyền</h2>
            <p class="text-slate-500 text-sm mb-5">Thiết bị này chưa được duyệt. Chủ sở hữu đã nhận được thông báo.</p>

            <!-- Device ID hiển thị -->
            <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-5">
                <div class="text-xs text-slate-400 font-semibold mb-1 uppercase tracking-wide">Mã thiết bị của bạn</div>
                <div id="display_device_id" class="font-mono text-xs text-slate-700 font-bold break-all"></div>
            </div>

            <!-- Nút copy mã -->
            <button onclick="copyDeviceId()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 active:scale-95 text-white font-bold rounded-2xl text-sm transition-all flex items-center justify-center gap-2 mb-3">
                <i class="fa-solid fa-copy"></i> Sao chép mã
            </button>

            <!-- Đang chờ -->
            <div class="text-slate-400 text-xs flex items-center justify-center gap-1">
                <span>Đang chờ duyệt</span>
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
        </div>
    </div>

    <!-- ── MAIN CARD ── -->
    <div id="main_app" class="hidden bg-white rounded-3xl shadow-2xl p-6 md:p-8 w-full max-w-md">

        <!-- Header -->
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-500 flex items-center justify-center shadow-lg shadow-blue-200">
                <i class="fa-solid fa-user-check text-white text-sm"></i>
            </div>
            <div>
                <h1 class="text-base font-black text-slate-800 uppercase tracking-wide leading-none">Locket Tool</h1>
                <p class="text-xs text-slate-400 font-medium mt-0.5">Check thông tin & Kick Gold</p>
            </div>
        </div>

        <!-- Input + Check button -->
        <div class="flex flex-col sm:flex-row gap-3 mb-4">
            <div class="relative flex-1">
                <i class="fa-solid fa-at absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
                <input
                    type="text"
                    id="username_input"
                    placeholder="Dán link locket.cam/... hoặc nhập Username..."
                    class="form-input w-full pl-11 pr-4 py-4 rounded-2xl text-sm font-semibold placeholder:font-normal placeholder:text-slate-400"
                >
            </div>
            <button
                id="btn_check"
                onclick="checkUser()"
                class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white px-6 py-4 sm:py-0 font-bold rounded-2xl transition-all shadow-md shadow-blue-200 whitespace-nowrap text-sm"
            >
                <i class="fa-solid fa-search mr-1.5"></i>CHECK
            </button>
        </div>

        <!-- Loading skeleton -->
        <div id="action_loading" class="hidden text-center py-5">
            <div class="space-y-3">
                <div class="shimmer h-20 w-20 rounded-full mx-auto"></div>
                <div class="shimmer h-4 w-32 mx-auto"></div>
                <div class="shimmer h-3 w-24 mx-auto"></div>
            </div>
        </div>

        <!-- Result box -->
        <div id="result_box" class="hidden fade-up">
            <div class="border-t border-slate-100 pt-5 mt-1">

                <!-- Profile card (chụp ảnh vùng này) -->
                <div id="profile_card" class="bg-gradient-to-b from-slate-50 to-white border border-slate-200 rounded-3xl p-5 flex flex-col items-center text-center mb-4">
                    <div class="relative mb-3">
                        <img id="cust_avatar" src="" alt="avatar"
                             class="w-24 h-24 rounded-full object-cover border-4 border-white shadow-xl bg-slate-200">
                        <div id="gold_ring" class="hidden absolute inset-0 rounded-full border-[3px] border-amber-400 gold-pulse"></div>
                    </div>
                    <div id="cust_name" class="font-black text-slate-800 text-xl mb-1"></div>
                    <div class="text-xs text-slate-400 font-semibold mb-1">@<span id="cust_username"></span></div>
                    <!-- Gold badge (ẩn mặc định, hiện sau kick) -->
                    <div id="gold_badge" class="hidden mt-2">
                        <span class="inline-flex items-center gap-1.5 bg-amber-100 text-amber-600 border border-amber-200 px-3 py-1.5 rounded-full text-xs font-black">
                            <i class="fa-solid fa-star text-amber-500"></i> ĐÃ CÓ GOLD
                        </span>
                    </div>
                </div>

                <!-- Kick Gold button -->
                <button
                    id="btn_kick"
                    onclick="kickGold()"
                    class="w-full py-4 bg-gradient-to-r from-amber-500 to-orange-400 hover:from-amber-400 hover:to-orange-300 active:scale-95 text-white font-black rounded-2xl transition-all shadow-lg shadow-amber-200 text-sm uppercase tracking-wide flex items-center justify-center gap-2 mb-3"
                >
                    <i class="fa-solid fa-bolt text-base"></i>
                    KICK GOLD NGAY
                </button>

                <!-- Kick loading -->
                <div id="kick_loading" class="hidden text-center py-3 bg-amber-50 rounded-2xl border border-amber-100 mb-3">
                    <i class="fa-solid fa-spinner fa-spin text-amber-500 mr-2"></i>
                    <span class="text-amber-600 font-bold text-sm">Đang kick Gold...</span>
                </div>

                <!-- Kick result card -->
                <div id="kick_result_card" class="hidden fade-up"></div>

                <!-- Copy image button (hiện sau kick thành công) -->
                <button
                    id="btn_copy_img"
                    onclick="copyCard()"
                    class="hidden w-full mt-3 py-3 bg-slate-800 hover:bg-slate-700 active:scale-95 text-white font-bold rounded-2xl transition-all text-sm flex items-center justify-center gap-2"
                >
                    <i class="fa-solid fa-copy"></i> Sao chép ảnh
                </button>
            </div>
        </div>

    </div>

    <script>
        const WORKER_URL = 'https://shopbanhang.caovannamutt.workers.dev/';

        let checkedUsername  = '';
        let cachedAvatarB64  = '';
        let deviceId         = '';

        // ── Khởi tạo Device ID ──
        function initDevice() {
            let id = localStorage.getItem('locket_device_id');
            // Reset nếu là format cũ (UUID dài)
            if (id && id.startsWith('dev-') && id.length > 20) {
                localStorage.removeItem('locket_device_id');
                id = null;
            }
            if (!id) {
                // Tạo ID ngắn: DEVGOLD_XXXX (4 ký tự ngẫu nhiên)
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let suffix = '';
                const arr = crypto.getRandomValues(new Uint8Array(4));
                arr.forEach(b => suffix += chars[b % chars.length]);
                id = 'DEVGOLD_' + suffix;
                localStorage.setItem('locket_device_id', id);
            }
            deviceId = id;
            document.getElementById('display_device_id').textContent = id;
        }

        // ── Copy Device ID ──
        function copyDeviceId() {
            navigator.clipboard.writeText(deviceId).then(() => {
                const btn = event.target.closest('button');
                btn.innerHTML = '<i class="fa-solid fa-check"></i> Đã sao chép!';
                setTimeout(() => { btn.innerHTML = '<i class="fa-solid fa-copy"></i> Sao chép mã'; }, 2000);
            });
        }

        // ── Kiểm tra thiết bị khi tải trang ──
        async function checkDevice() {
            initDevice();
            try {
                const res  = await fetch(WORKER_URL, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username: '__device_check__', action: 'check', device_id: deviceId })
                });
                const data = await res.json();

                if (data.error === 'DEVICE_NOT_APPROVED') {
                    // Hiện màn hình chờ duyệt
                    document.getElementById('device_pending').classList.remove('hidden');
                    document.getElementById('main_app').classList.add('hidden');
                    // Poll lại sau 10s
                    setTimeout(checkDevice, 10000);
                } else {
                    // Thiết bị hợp lệ → hiện app
                    document.getElementById('device_pending').classList.add('hidden');
                    document.getElementById('main_app').classList.remove('hidden');
                }
            } catch {
                // Nếu lỗi mạng → vẫn cho dùng (tránh block oan)
                document.getElementById('device_pending').classList.add('hidden');
                document.getElementById('main_app').classList.remove('hidden');
            }
        }

        // Chạy ngay khi trang tải
        checkDevice();

        // ── Auto-extract username from locket.cam link ──
        const inputEl = document.getElementById('username_input');
        inputEl.addEventListener('input', function(e) {
            let val = e.target.value.trim();
            if (!val.includes('locket.cam/')) return;
            try {
                const url  = new URL(val.startsWith('http') ? val : 'https://' + val);
                let   path = url.pathname.replace('/', '').replace('@', '');
                if (path && !path.startsWith('invite')) {
                    e.target.value = path;
                    flash(inputEl);
                }
            } catch {
                const m = val.match(/locket\.cam\/(@?[a-zA-Z0-9_.-]+)/);
                if (m && m[1] && !m[1].replace('@','').startsWith('invite')) {
                    e.target.value = m[1].replace('@','');
                }
            }
        });
        inputEl.addEventListener('keydown', e => { if (e.key === 'Enter') checkUser(); });

        function flash(el) {
            el.classList.add('ring-2','ring-blue-400','bg-blue-50');
            setTimeout(() => el.classList.remove('ring-2','ring-blue-400','bg-blue-50'), 600);
        }

        // ── CHECK (action: check — chỉ lấy thông tin) ──
        async function checkUser() {
            const input   = document.getElementById('username_input');
            const btn     = document.getElementById('btn_check');
            const loading = document.getElementById('action_loading');
            const resultBox = document.getElementById('result_box');
            const kickResultCard = document.getElementById('kick_result_card');

            const raw = input.value.trim();
            if (!raw) { alert('Vui lòng nhập Username hoặc dán link Locket!'); return; }
            if (raw.length > 15) { alert('Username tối đa 15 ký tự!'); return; }

            btn.disabled = true; btn.classList.add('opacity-50');
            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');
            kickResultCard.classList.add('hidden');
            kickResultCard.innerHTML = '';
            checkedUsername = '';

            try {
                const res  = await fetch(WORKER_URL, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username: raw, action: 'check', device_id: deviceId })
                });
                const data = await res.json();

                loading.classList.add('hidden');
                btn.disabled = false; btn.classList.remove('opacity-50');

                if (data.success) {
                    checkedUsername = data.username || raw;
                    const name   = data.name   || raw;
                    const avatar = data.avatar  || '';

                    document.getElementById('cust_name').textContent     = name;
                    document.getElementById('cust_username').textContent = checkedUsername;
                    document.getElementById('cust_avatar').src = avatar
                        ? avatar
                        : `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=2563eb&color=fff&size=256&bold=true`;
                    document.getElementById('gold_ring').classList.add('hidden');
                    document.getElementById('btn_kick').disabled = false;
                    document.getElementById('btn_kick').classList.remove('opacity-40');

                    resultBox.classList.remove('hidden');
                } else {
                    const errMsg = data.error || 'Không xác định';
                    alert('❌ ' + errMsg);
                }

            } catch(e) {
                console.error(e);
                loading.classList.add('hidden');
                btn.disabled = false; btn.classList.remove('opacity-50');
                alert('❌ Lỗi kết nối: ' + e.message);
            }
        }

        // ── KICK GOLD (không có action — kick thực sự) ──
        async function kickGold() {
            if (!checkedUsername) return;

            const btn         = document.getElementById('btn_kick');
            const kickLoading = document.getElementById('kick_loading');
            const kickResult  = document.getElementById('kick_result_card');

            btn.disabled = true; btn.classList.add('opacity-40');
            kickLoading.classList.remove('hidden');
            kickResult.classList.add('hidden');
            kickResult.innerHTML = '';

            try {
                const res  = await fetch(WORKER_URL, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ username: checkedUsername, device_id: deviceId })
                });
                const data = await res.json();

                kickLoading.classList.add('hidden');

                if (data.success) {
                    const name   = data.name    || checkedUsername;
                    const uname  = data.username || checkedUsername;
                    const avatar = data.avatar   || '';

                    // ── Fetch avatar → base64 ngay bây giờ để copy ảnh sau không bị CORS ──
                    cachedAvatarB64 = '';
                    const avatarImgEl = document.getElementById('cust_avatar');
                    if (avatar) {
                        try {
                            const b64 = await urlToBase64(avatar);
                            cachedAvatarB64 = b64;
                            avatarImgEl.src = b64;   // hiện avatar trên UI cũng dùng base64
                        } catch {
                            avatarImgEl.src = avatar; // fallback: hiện bằng URL gốc
                        }
                    }

                    // Hiện vòng gold + badge gold trên profile card
                    document.getElementById('gold_ring').classList.remove('hidden');
                    document.getElementById('gold_badge').classList.remove('hidden');

                    kickResult.innerHTML = `
                        <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 text-center">
                            <div class="text-3xl mb-2">🎉</div>
                            <div class="text-emerald-700 font-black text-base mb-1">Kick Gold Thành Công!</div>
                            <div class="text-emerald-600 text-xs font-medium">
                                <span class="font-bold">${name}</span> (@${uname}) đã được kick Gold.
                            </div>
                        </div>`;
                    kickResult.classList.remove('hidden');
                    // Ẩn nút kick, hiện nút copy ảnh
                    btn.classList.add('hidden');
                    document.getElementById('btn_copy_img').classList.remove('hidden');

                } else {
                    const errMsg = data.error || 'Không xác định';
                    kickResult.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded-2xl p-4 text-center">
                            <div class="text-2xl mb-1">❌</div>
                            <div class="text-red-600 font-bold text-sm">Kick Thất Bại</div>
                            <div class="text-red-400 text-xs mt-1">${errMsg}</div>
                        </div>`;
                    kickResult.classList.remove('hidden');
                    btn.disabled = false; btn.classList.remove('opacity-40');
                }

            } catch(e) {
                console.error(e);
                kickLoading.classList.add('hidden');
                kickResult.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-2xl p-4 text-center">
                        <div class="text-red-600 font-bold text-sm">❌ Lỗi kết nối</div>
                        <div class="text-red-400 text-xs mt-1">${e.message}</div>
                    </div>`;
                kickResult.classList.remove('hidden');
                btn.disabled = false; btn.classList.remove('opacity-40');
            }
        }

        // ── COPY ảnh — vẽ thủ công bằng Canvas 2D ──
        async function copyCard() {
            const btn   = document.getElementById('btn_copy_img');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang chụp...';

            try {
                // ─ Lấy dữ liệu hiện tại trên UI ─
                const name   = document.getElementById('cust_name').textContent.trim();
                const uname  = document.getElementById('cust_username').textContent.trim();
                const avatarSrc = document.getElementById('cust_avatar').src;

                // ─ Dùng cachedAvatarB64 (base64 đã fetch sẵn khi kick) ─
                let avatarBitmap = null;
                if (cachedAvatarB64) {
                    try {
                        const img = new Image();
                        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = cachedAvatarB64; });
                        avatarBitmap = img;
                    } catch(e) { console.warn('avatar bitmap fail', e); }
                }

                // ─ Cấu hình canvas ─
                const W = 480, H = 340;
                const canvas = document.createElement('canvas');
                canvas.width  = W * 2;  // @2x
                canvas.height = H * 2;
                const ctx = canvas.getContext('2d');
                ctx.scale(2, 2);

                // Nền card
                const r = 24;
                ctx.beginPath();
                ctx.moveTo(r, 0); ctx.lineTo(W-r, 0);
                ctx.quadraticCurveTo(W, 0, W, r);
                ctx.lineTo(W, H-r);
                ctx.quadraticCurveTo(W, H, W-r, H);
                ctx.lineTo(r, H);
                ctx.quadraticCurveTo(0, H, 0, H-r);
                ctx.lineTo(0, r);
                ctx.quadraticCurveTo(0, 0, r, 0);
                ctx.closePath();
                // gradient nền
                const grad = ctx.createLinearGradient(0,0,0,H);
                grad.addColorStop(0, '#f8fafc');
                grad.addColorStop(1, '#ffffff');
                ctx.fillStyle = grad;
                ctx.fill();
                // viền
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Vị trí avatar
                const cx = W / 2, cy = 115, av = 54; // cx, cy tâm, av bán kính

                // Về vòng gold
                ctx.save();
                ctx.beginPath();
                ctx.arc(cx, cy, av + 5, 0, Math.PI * 2);
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 4;
                ctx.shadowColor = 'rgba(251,191,36,0.5)';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.restore();

                // Vời tròn clip rồi vẽ nh avatar
                ctx.save();
                ctx.beginPath();
                ctx.arc(cx, cy, av, 0, Math.PI * 2);
                ctx.clip();
                if (avatarBitmap) {
                    // vẽ ảnh fit vào hình tròn
                    const s = av * 2;
                    ctx.drawImage(avatarBitmap, cx - av, cy - av, s, s);
                } else {
                    // fallback nền xám
                    ctx.fillStyle = '#e2e8f0';
                    ctx.fillRect(cx-av, cy-av, av*2, av*2);
                }
                ctx.restore();

                // Viền trắng avatar
                ctx.save();
                ctx.beginPath();
                ctx.arc(cx, cy, av + 1, 0, Math.PI * 2);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.restore();

                // Tên
                ctx.fillStyle = '#1e293b';
                ctx.font = 'bold 22px "Plus Jakarta Sans", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(name, cx, cy + av + 30);

                // @username
                ctx.fillStyle = '#94a3b8';
                ctx.font = '600 13px "Plus Jakarta Sans", sans-serif';
                ctx.fillText('@' + uname, cx, cy + av + 50);

                // Badge ĐÃ CÓ GOLD
                const bw = 130, bh = 28, bx = cx - bw/2, by = cy + av + 64;
                // Nền badge
                ctx.save();
                ctx.beginPath();
                const br = bh / 2;
                ctx.moveTo(bx + br, by);
                ctx.lineTo(bx + bw - br, by);
                ctx.quadraticCurveTo(bx+bw, by, bx+bw, by+br);
                ctx.lineTo(bx+bw, by+bh-br);
                ctx.quadraticCurveTo(bx+bw, by+bh, bx+bw-br, by+bh);
                ctx.lineTo(bx+br, by+bh);
                ctx.quadraticCurveTo(bx, by+bh, bx, by+bh-br);
                ctx.lineTo(bx, by+br);
                ctx.quadraticCurveTo(bx, by, bx+br, by);
                ctx.closePath();
                ctx.fillStyle = '#fef3c7';
                ctx.fill();
                ctx.strokeStyle = '#fde68a';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
                // Text badge
                ctx.fillStyle = '#d97706';
                ctx.font = 'bold 12px "Plus Jakarta Sans", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('★ ĐÃ CÓ GOLD', cx, by + 19);

                // ─ Copy / download ─
                canvas.toBlob(async (blob) => {
                    try {
                        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                        btn.innerHTML = '<i class="fa-solid fa-check"></i> Đã sao chép!';
                        btn.classList.remove('bg-slate-800','hover:bg-slate-700');
                        btn.classList.add('bg-emerald-600','hover:bg-emerald-500');
                        setTimeout(() => {
                            btn.innerHTML = '<i class="fa-solid fa-copy"></i> Sao chép ảnh';
                            btn.classList.remove('bg-emerald-600','hover:bg-emerald-500');
                            btn.classList.add('bg-slate-800','hover:bg-slate-700');
                            btn.disabled = false;
                        }, 2000);
                    } catch {
                        const a = document.createElement('a');
                        a.href = canvas.toDataURL('image/png');
                        a.download = `locket_gold_${checkedUsername}.png`;
                        a.click();
                        btn.innerHTML = '<i class="fa-solid fa-copy"></i> Sao chép ảnh';
                        btn.disabled = false;
                    }
                }, 'image/png');

            } catch(e) {
                console.error(e);
                btn.innerHTML = '<i class="fa-solid fa-copy"></i> Sao chép ảnh';
                btn.disabled = false;
            }
        }

        // ── Helper: fetch URL → base64 (thử trực tiếp rồi qua proxy) ──
        async function urlToBase64(url) {
            const toB64 = async (fetchUrl) => {
                const r = await fetch(fetchUrl, { cache: 'no-cache' });
                if (!r.ok) throw new Error('fetch fail');
                const blob = await r.blob();
                return new Promise((res, rej) => {
                    const reader = new FileReader();
                    reader.onload  = () => res(reader.result);
                    reader.onerror = rej;
                    reader.readAsDataURL(blob);
                });
            };
            try { return await toB64(url); } catch {}
            return await toB64('https://corsproxy.io/?' + encodeURIComponent(url));
        }
    </script>
